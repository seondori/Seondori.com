name: RAM New Price Collector (Danawa)

on:
  schedule:
    - cron: '0 1 * * *'   # 한국시간 10:00
    - cron: '0 4 * * *'
    - cron: '0 9 * * *'   # 한국시간 18:00
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install latest Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install selenium webdriver-manager requests

      - name: Run danawa crawler
        run: |
          cd backend
          python crawler_api_based.py

      - name: Check results
        if: always()
        run: |
          if ls backend/ram_new_*.json 1> /dev/null 2>&1; then
            echo "✅ 신품 시세 파일 확인됨"
            ls -lah backend/ram_new_*.json
          else
            echo "⚠️ 결과 파일 없음"
          fi

      - name: Upload debug on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: danawa-debug-${{ github.run_id }}
          path: backend/danawa_debug_*.png
          retention-days: 3

      - name: Commit and push
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add -A
          if git diff --staged --quiet; then
            echo "ℹ️ 변경사항 없음"
          else
            git commit -m "🔍 다나와 시세 업데이트: $(date +'%Y-%m-%d %H:%M')"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "⚠️ Push 실패 (시도 $i/3), 5초 후 재시도..."
              sleep 5
            done
          fi
