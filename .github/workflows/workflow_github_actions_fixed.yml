name: RAM Price Crawler (Self-Hosted)

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 4 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python dependencies
        shell: cmd
        run: pip install selenium webdriver-manager requests

      - name: Run crawler
        shell: cmd
        env:
          PYTHONIOENCODING: utf-8
        run: |
          cd backend
          python crawler_cookie_based_fixed.py

      - name: Check results
        if: always()
        shell: cmd
        run: |
          if exist backend\ram_price_junggo.json (
            echo ✅ 결과 파일 확인됨
          ) else (
            echo ⚠️ 결과 파일 없음
          )

      - name: Commit and push
        if: success()
        shell: cmd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git remote set-url origin https://x-access-token:%GITHUB_TOKEN%@github.com/${{ github.repository }}.git
          git add -A
          git diff --staged --quiet || (git commit -m "중고 시세 업데이트" && git pull --rebase origin main && git push origin main)
